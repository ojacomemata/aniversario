<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Nuestro Álbum ❤️</title>

    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/album.css">

    <meta name="color-scheme" content="light">
    <link rel="stylesheet" href="./css/scrapbook.css">
    
</head>

<body>

    <nav class="page-nav">

        <a href="./index.html">
            ← Volver a la historia
        </a>

        <a href="./letter.html">
            Leer la carta →
        </a>

    </nav>

    <main>

        <section class="album-hero">

            <div class="container">

                <h1>
                    Nuestro álbum
                </h1>

                <p>
                    Cada fotografía es una pequeña cápsula del tiempo.
                </p>

            </div>

        </section>


        <section class="album-year">

            <div class="container">

                <h2>2023</h2>

                <div class="photo-grid" id="album-gallery">

                    <div class="polaroid rotate-left">

                        <img
                            src="./assets/photos/timeline/2023.jpg"
                            alt="2023"
                        >

                        <p>
                            El inicio ❤️
                        </p>

                    </div>


                    <div class="polaroid rotate-right">

                        <img
                            src="./assets/photos/timeline/2024.jpg"
                            alt="2023"
                        >

                        <p>
                            Primeras aventuras ✨
                        </p>

                    </div>


                    <div class="polaroid">

                        <img
                            src="./assets/photos/timeline/2025.jpg"
                            alt="2023"
                        >

                        <p>
                            Nosotros 🫶
                        </p>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <script src="./js/album.js"></script>

</body>

</html>
