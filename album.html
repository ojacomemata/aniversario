<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Nuestro Álbum ❤️</title>

    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/album.css">

    <meta name="color-scheme" content="light">
    <link rel="stylesheet" href="./css/scrapbook.css">
    
</head>

<body>

    <header class="subpage-header">

        <div class="container">

            <a
                href="./index.html"
                class="back-button"
            >
                ← Regresar
            </a>

        </div>

    </header>   

    <main>

        <section class="album-hero">

            <div class="container">

                <h1>
                    Nuestro álbum
                </h1>

                <p>
                    Cada fotografía es una pequeña cápsula del tiempo.
                </p>

            </div>

        </section>


        <section class="album-year">

            <div class="container">

                <h2>2023</h2>

                <div class="photo-grid">

                    <div class="polaroid rotate-left">

                        <img
                            src="./assets/photos/timeline/2023.jpg"
                            data-full="./assets/photos/timeline/2023.jpg"
                            alt="2023"
                        >

                        <p>
                            El inicio ❤️
                        </p>

                    </div>


                    <div class="polaroid rotate-right">

                        <img
                            src="./assets/photos/timeline/2024.jpg"
                            data-full="./assets/photos/timeline/2024.jpg"
                            alt="2024"
                        >

                        <p>
                            Primeras aventuras ✨
                        </p>

                    </div>


                    <div class="polaroid">

                        <img
                            src="./assets/photos/timeline/2025.jpg"
                            data-full="./assets/photos/timeline/2025.jpg"
                            alt="2025"
                        >

                        <p>
                            Nosotros 🫶
                        </p>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <script src="./js/album.js"></script>

    <div id="viewer">

        <div class="viewer-backdrop"></div>

        <img
            id="viewer-image"
            src=""
            alt=""
        >

        <button id="viewer-close">
            ✕
        </button>

    </div>

    <script src="./js/viewer.js"></script>
    <script src="./js/album.js"></script>

</body>

</html>
